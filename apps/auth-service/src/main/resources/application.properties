spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/gummi_auth_db
spring.datasource.username=gummi_user
spring.datasource.password=gummi_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health

gummi.jwt.secret=GUMMI_SUPER_SECRET_KEY_CHANGE_THIS_LATER_1234567890
gummi.jwt.expiration-ms=86400000
